name: INVICTUS Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

# 5분 간격 실행 시 이전 run이 늦어지면 다음 run과 겹칠 수 있다.
# 동시성 그룹으로 적체 방지.
concurrency:
  group: monitor-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run INVICTUS Monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: python monitor.py
